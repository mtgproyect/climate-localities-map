name: Deploy localities weather map

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: climate-localities-map-pages
  cancel-in-progress: false

jobs:
  build:
    name: Validar y preparar sitio
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar archivos
        run: python scripts/validate_site.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Crear artefacto de Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    name: Publicar GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4

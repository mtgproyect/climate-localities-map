name: Deploy localities weather map

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: climate-localities-map-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Validar y publicar en Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validar archivos
        run: python scripts/validate_site.py

      - name: Publicar en Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Falta el secret CLOUDFLARE_API_TOKEN."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Falta el secret CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

          npx wrangler@latest pages deploy docs \
            --project-name=weathervar-map \
            --branch=main

          echo "Mapa de localidades publicado correctamente en Cloudflare Pages."
